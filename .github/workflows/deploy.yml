name: CI + Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  ORG: thefractionalpm

jobs:

  # ── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Validate docker-compose.yml syntax
        run: |
          docker compose config --quiet
          echo "docker-compose.yml syntax OK"

  # ── Job 2: Build & Push Docker images ─────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test        # only runs if tests pass

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image tag (short SHA)
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push playwright
        uses: docker/build-push-action@v5
        with:
          context: ./playwright
          dockerfile: ./playwright/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-playwright:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-playwright:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build & push classifier
        uses: docker/build-push-action@v5
        with:
          context: ./classifier
          dockerfile: ./classifier/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-classifier:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-classifier:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build & push translator
        uses: docker/build-push-action@v5
        with:
          context: ./translator
          dockerfile: ./translator/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-translator:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-translator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Job 3: Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to vps.openautonomyx.com
    runs-on: ubuntu-latest
    needs: build       # only runs if build passes

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: vps.openautonomyx.com
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -e

            cd /home/ubuntu/autonomyx-model-gateway

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Removing obsolete version attribute ==="
            sed -i '/^version:/d' docker-compose.yml

            echo "=== Pulling pre-built images from Docker Hub ==="
            docker compose pull playwright classifier translator || true

            echo "=== Starting all services ==="
            docker compose up -d --remove-orphans

            echo "=== Waiting for gateway to be ready ==="
            for i in $(seq 1 12); do
              if curl -sf -o /dev/null \
                -H "Authorization: Bearer ${LITELLM_MASTER_KEY}" \
                http://localhost:4000/health; then
                echo "Gateway healthy after ${i}x5s"
                break
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
              if [ $i -eq 12 ]; then
                echo "ERROR: Gateway did not become healthy in 60s"
                docker compose logs litellm --tail 30
                exit 1
              fi
            done

            echo "=== Final service status ==="
            docker compose ps

            echo "=== Deploy complete ==="
