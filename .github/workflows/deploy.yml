name: CI + Build + Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  ORG: thefractionalpm

jobs:

  # ── Job 1: Test + Lint ─────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration"

      - name: Validate compose files
        run: |
          python3 scripts/gen_ci_env.py
          docker compose -f docker-compose.yml --env-file .env.ci config --quiet
          echo "docker-compose.yml OK"
          docker compose -f docker-compose.business.yml --env-file .env.ci config --quiet
          echo "docker-compose.business.yml OK"
          rm -f .env.ci

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: playwright/Dockerfile
          failure-threshold: error

      - name: Lint classifier Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: classifier/Dockerfile
          failure-threshold: error

      - name: Lint translator Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: translator/Dockerfile
          failure-threshold: error

  # ── Job 2: Build & Push Docker images ─────────────────────────────────────

  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: test
    # Run on push to main only — too slow for every PR
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        run: pytest tests/test_containers.py -v --tb=short -m integration
        timeout-minutes: 15

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image tag (short SHA)
        id: meta
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & push frpc
        uses: docker/build-push-action@v5
        with:
          context: ./frpc
          file: ./frpc/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-frpc:0.62.0
            ${{ env.ORG }}/autonomyx-frpc:latest
          build-args: |
            FRP_VERSION=0.62.0
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/fatedier/frp
          cache-from: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache
          cache-to: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache,mode=max
          platforms: linux/amd64

      - name: Build & push playwright
        uses: docker/build-push-action@v5
        with:
          context: ./playwright
          file: ./playwright/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-playwright:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-playwright:latest
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache
          cache-to: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache,mode=max
          platforms: linux/amd64

      - name: Build & push classifier
        uses: docker/build-push-action@v5
        with:
          context: ./classifier
          file: ./classifier/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-classifier:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-classifier:latest
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache
          cache-to: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache,mode=max
          platforms: linux/amd64

      - name: Build & push translator
        uses: docker/build-push-action@v5
        with:
          context: ./translator
          file: ./translator/Dockerfile
          push: true
          tags: |
            ${{ env.ORG }}/autonomyx-translator:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-translator:latest
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache
          cache-to: type=registry,ref=${{ env.ORG }}/autonomyx-cache:buildcache,mode=max
          platforms: linux/amd64

      - name: Docker Scout — scan all images for CVEs
        uses: docker/scout-action@v1
        continue-on-error: true   # advisory only — does not fail the build
        with:
          command: cves
          image: |
            ${{ env.ORG }}/autonomyx-playwright:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-classifier:${{ steps.meta.outputs.version }}
            ${{ env.ORG }}/autonomyx-translator:${{ steps.meta.outputs.version }}
          only-severities: critical,high
          exit-code: false
          summary: true

  # ── Job 3: Deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to vps.openautonomyx.com
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Inject secrets into server .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: vps.openautonomyx.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          envs: GROQ_API_KEY,ANTHROPIC_API_KEY,OPENAI_API_KEY,VERTEX_PROJECT_ID,VERTEX_LOCATION,RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET,STRIPE_SECRET_KEY,GLITCHTIP_AUTH_TOKEN,LITELLM_MASTER_KEY,FRP_TOKEN
          script: |
            set -e
            # Ensure ubuntu is in docker group (bootstrap may have just added it)
            if ! groups | grep -q docker; then
              echo "Adding ubuntu to docker group..."
              sudo usermod -aG docker ubuntu
              exec sg docker "$0 $@"
            fi
            cd /home/ubuntu/autonomyx-model-gateway

            # Write each secret from GitHub Secrets into .env
            # Only writes if the value is non-empty — never blanks existing values
            write_secret() {
              local key="$1" val="$2"
              [ -z "$val" ] && return
              if grep -qE "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" .env
              else
                echo "${key}=${val}" >> .env
              fi
            }

            write_secret "GROQ_API_KEY"           "$GROQ_API_KEY"
            write_secret "ANTHROPIC_API_KEY"      "$ANTHROPIC_API_KEY"
            write_secret "OPENAI_API_KEY"         "$OPENAI_API_KEY"
            write_secret "VERTEX_PROJECT_ID"      "$VERTEX_PROJECT_ID"
            write_secret "VERTEX_LOCATION"        "$VERTEX_LOCATION"
            write_secret "RAZORPAY_KEY_ID"        "$RAZORPAY_KEY_ID"
            write_secret "RAZORPAY_KEY_SECRET"    "$RAZORPAY_KEY_SECRET"
            write_secret "STRIPE_SECRET_KEY"      "$STRIPE_SECRET_KEY"
            write_secret "GLITCHTIP_AUTH_TOKEN"   "$GLITCHTIP_AUTH_TOKEN"
            write_secret "LITELLM_MASTER_KEY"         "$LITELLM_MASTER_KEY"
            write_secret "FRP_TOKEN"  "$FRP_TOKEN"

            echo "Secrets injected into .env"

      - name: Verify server ready + update system packages
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: vps.openautonomyx.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            set -e

            # Check cloud-init bootstrap completed
            # If not done yet, wait up to 5 minutes (handles race on brand new VPS)
            for i in $(seq 1 30); do
              if [ -f /var/lib/autonomyx-bootstrap-complete ]; then
                echo "Cloud-init bootstrap: complete"
                break
              fi
              echo "Waiting for cloud-init bootstrap... ($i/30)"
              sleep 10
              if [ $i -eq 30 ]; then
                echo "WARNING: bootstrap marker not found — running bootstrap now"
                curl -fsSL https://raw.githubusercontent.com/OpenAutonomyx/autonomyx-model-gateway/main/cloud-init/user-data.sh | bash
              fi
            done

            # Always run apt update + upgrade on deploy (security patches).
            # DPkg::Lock::Timeout makes apt wait for the lock itself — covers all
            # four lock files and avoids the check/grab race in the old fuser
            # loop. 600s outlasts a normal unattended-upgrades run. (apt 2.1+)
            export DEBIAN_FRONTEND=noninteractive
            APT="sudo apt-get -o DPkg::Lock::Timeout=600"
            $APT update -qq
            $APT upgrade -y -qq \
              -o Dpkg::Options::="--force-confdef" \
              -o Dpkg::Options::="--force-confold"
            $APT autoremove -y -qq
            echo "System packages up to date"

            # Verify Docker
            docker --version
            docker compose version

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: vps.openautonomyx.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -e

            cd /home/ubuntu/autonomyx-model-gateway

            echo "=== Pulling latest code (BEFORE running any scripts) ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Bootstrapping generated secrets ==="
            chmod +x scripts/bootstrap_env.sh
            bash scripts/bootstrap_env.sh

            echo "=== Checking required env vars ==="
            MISSING=()
            for var in LITELLM_MASTER_KEY POSTGRES_PASSWORD GROQ_API_KEY \
                       LANGFLOW_SECRET_KEY LANGFLOW_DB_PASSWORD LANGFLOW_ADMIN_PASSWORD \
                       GLITCHTIP_SECRET_KEY GLITCHTIP_DB_PASSWORD \
                       SURREAL_PASS OPENFGA_DB_PASSWORD OPENFGA_PRESHARED_KEY; do
              val=$(grep "^${var}=" /home/ubuntu/autonomyx-model-gateway/.env | cut -d= -f2-)
              if [ -z "$val" ] || echo "$val" | grep -q "YOUR_"; then
                MISSING+=("$var")
              fi
            done
            if [ ${#MISSING[@]} -gt 0 ]; then
              echo "ERROR: Missing or placeholder values in .env:"
              printf '  - %s\n' "${MISSING[@]}"
              exit 1
            fi
            echo "All required env vars present"

            echo "=== Removing obsolete version attribute ==="
            sed -i '/^version:/d' docker-compose.yml

            echo "=== Pulling pre-built images from Docker Hub ==="
            docker compose pull playwright classifier translator || true

            echo "=== Starting all services ==="
            docker compose up -d --remove-orphans

            echo "=== Pruning unused Docker resources ==="
            # Remove stopped containers, dangling images, unused networks
            # --filter until=24h: only remove resources older than 24h
            # Never removes: running containers, named volumes, active images
            docker container prune -f --filter "until=24h"
            docker image prune -f --filter "until=24h"
            docker network prune -f
            docker builder prune -f --filter "until=168h"  # build cache older than 7d
            echo "Disk after prune: $(df -h / | tail -1 | awk '{print $4}') free"

            echo "=== Waiting for gateway to be ready ==="
            for i in $(seq 1 12); do
              if curl -sf -o /dev/null \
                -H "Authorization: Bearer ${LITELLM_MASTER_KEY}" \
                http://localhost:4000/health; then
                echo "Gateway healthy after ${i}x5s"
                break
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
              if [ $i -eq 12 ]; then
                echo "ERROR: Gateway did not become healthy in 60s"
                docker compose logs litellm --tail 30
                exit 1
              fi
            done

            echo "=== SurrealDB: ensure healthy ==="
            for i in $(seq 1 12); do
              if docker exec autonomyx-surrealdb /surreal is-ready                    --conn http://localhost:8000 2>/dev/null; then
                echo "SurrealDB healthy"
                break
              fi
              echo "Waiting for SurrealDB... ($i/12)"
              sleep 5
            done

            echo "=== OpenFGA: bootstrap if needed ==="
            # Only bootstrap if OPENFGA_STORE_ID is not yet set
            STORE_ID=$(grep "^OPENFGA_STORE_ID=" .env | cut -d= -f2-)
            PRESHARED=$(grep "^OPENFGA_PRESHARED_KEY=" .env | cut -d= -f2-)
            if [ -z "$STORE_ID" ] || echo "$STORE_ID" | grep -q "^$"; then
              echo "Creating OpenFGA store..."
              # Wait for OpenFGA to be ready
              for i in $(seq 1 12); do
                if curl -sf -o /dev/null                   -H "Authorization: Bearer $PRESHARED"                   http://localhost:8080/healthz; then
                  echo "OpenFGA ready"
                  break
                fi
                echo "Waiting for OpenFGA... ($i/12)"
                sleep 5
              done

              # Create store
              STORE_RESP=$(curl -s -X POST http://localhost:8080/stores                 -H "Authorization: Bearer $PRESHARED"                 -H "Content-Type: application/json"                 -d '{"name":"autonomyx-gateway"}')
              NEW_STORE_ID=$(echo "$STORE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")

              if [ -n "$NEW_STORE_ID" ]; then
                echo "Store created: $NEW_STORE_ID"
                sed -i "s/^OPENFGA_STORE_ID=.*/OPENFGA_STORE_ID=$NEW_STORE_ID/" .env
                echo "OPENFGA_STORE_ID saved to .env"

                # Upload authorization model
                MODEL_DSL=$(cat openfga/model.fga)
                MODEL_RESP=$(curl -s -X POST                   "http://localhost:8080/stores/${NEW_STORE_ID}/authorization-models"                   -H "Authorization: Bearer $PRESHARED"                   -H "Content-Type: application/json"                   -d "{"schema_version":"1.1","type_definitions":[]}")
                echo "Model upload attempted (manual verify recommended)"

                # Write bootstrap tuples (strip JSON comments first)
                python3 scripts/prep_fga_tuples.py
                HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST                   "http://localhost:8080/stores/${NEW_STORE_ID}/write"                   -H "Authorization: Bearer $PRESHARED"                   -H "Content-Type: application/json"                   -d @/tmp/fga_tuples.json)
                echo "Bootstrap tuples write: HTTP $HTTP"
                rm -f /tmp/fga_tuples.json

                # Restart LiteLLM to pick up new OPENFGA_STORE_ID
                docker compose restart litellm
              else
                echo "WARNING: Could not create OpenFGA store — check OPENFGA_PRESHARED_KEY"
              fi
            else
              echo "OpenFGA store already configured: $STORE_ID"
            fi

            echo "=== SurrealDB: migrate from cloud if needed ==="
            SURREAL_URL_LOCAL=$(grep "^SURREAL_URL=" .env | cut -d= -f2-)
            CLOUD_URL=$(grep "^SURREAL_URL_CLOUD=" .env | cut -d= -f2- || echo "")
            if [ -n "$CLOUD_URL" ] && ! echo "$CLOUD_URL" | grep -q "^#"; then
              echo "Cloud URL found — run migration manually:"
              echo "  ./scripts/migrate_surrealdb.sh"
              echo "Then comment out SURREAL_URL_CLOUD in .env"
            else
              echo "SurrealDB cloud URL not set — using self-hosted only"
            fi

            echo "=== GlitchTip: bootstrap uptime monitors ==="
            GLITCHTIP_URL=$(grep "^GLITCHTIP_DOMAIN=" .env | cut -d= -f2- | sed 's|https://||' || echo "")
            GLITCHTIP_AUTH_TOKEN=$(grep "^GLITCHTIP_AUTH_TOKEN=" .env | cut -d= -f2- || echo "")
            GLITCHTIP_URL="https://errors.openautonomyx.com"             GLITCHTIP_AUTH_TOKEN="$GLITCHTIP_AUTH_TOKEN"             python3 scripts/bootstrap_glitchtip_monitors.py

            echo "=== Trust centre: verify serving ==="
            if curl -sf -o /dev/null http://localhost/; then
              echo "Trust container serving"
            fi

            echo "=== Final service status ==="

            echo "=== Syncing nginx configs ==="
            sudo cp /home/ubuntu/autonomyx-model-gateway/nginx/*.conf /etc/nginx/sites-available/ 2>/dev/null || true
            for conf in /etc/nginx/sites-available/llm.conf /etc/nginx/sites-available/flows.conf /etc/nginx/sites-available/metrics.conf /etc/nginx/sites-available/errors.conf /etc/nginx/sites-available/trust.conf /etc/nginx/sites-available/dockge.conf /etc/nginx/sites-available/db.conf; do
              if [ -f "$conf" ]; then
                name=$(basename "$conf")
                sudo ln -sf "$conf" /etc/nginx/sites-enabled/"$name" 2>/dev/null || true
              fi
            done
            sudo nginx -t && sudo systemctl reload nginx || echo "nginx reload failed"

            echo "=== TLS certificates ==="
            for domain in llm flows metrics errors trust dockge db; do
              if ! sudo test -d /etc/letsencrypt/live/${domain}.openautonomyx.com; then
                sudo certbot --nginx -d ${domain}.openautonomyx.com --non-interactive --agree-tos -m chinmay@openautonomyx.com 2>/dev/null || echo "certbot failed for ${domain}"
              fi
            done

            echo "=== Smoke tests ==="
            PASS=0
            FAIL=0
            for endpoint in "http://127.0.0.1:4000/health:401" "http://127.0.0.1:7860:200" "http://127.0.0.1:3000/api/health:200" "http://127.0.0.1:8080:200"; do
              url="${endpoint%:*}"
              url="${url%:*}:${endpoint##*:}"
              expected="${endpoint##*:}"
              # Simpler: just check if port responds
              url2=$(echo "$endpoint" | rev | cut -d: -f2- | rev)
              exp=$(echo "$endpoint" | rev | cut -d: -f1 | rev)
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$url2" 2>/dev/null || echo "000")
              if [ "$code" = "$exp" ]; then
                echo "  PASS: $url2 -> $code"
                PASS=$((PASS+1))
              else
                echo "  FAIL: $url2 -> $code (expected $exp)"
                FAIL=$((FAIL+1))
              fi
            done
            echo "Smoke: $PASS passed, $FAIL failed"

            echo "=== Hardening ==="
            sudo ufw status | head -5
            docker compose ps --format "table {{.Name}}\t{{.State}}" | grep -c running || true
            echo "Deploy complete"
            docker compose ps

            echo "=== Deploy complete ==="
