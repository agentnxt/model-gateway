# Autonomyx Model Gateway — Primary Node (96GB)
# Deploy: docker compose up -d
# Requires: .env filled from .env.example

networks:
  coolify:
    external: true

volumes:
  litellm-db-data:
  prometheus-data:
  grafana-data:
  langflow-data:
  langflow-db-data:
  ollama-data:
  loki-data:
  tempo-data:
  otel-data:
  dockge-data:
  surrealdb-data:
  openfga-db-data:
  glitchtip-db-data:
  glitchtip-uploads:

services:

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: autonomyx-litellm
    restart: always
    networks:
      - coolify
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      - STORE_MODEL_IN_DB=True
      - LITELLM_UI_USERNAME=${LITELLM_UI_USERNAME:-admin}
      - LITELLM_UI_PASSWORD=${LITELLM_UI_PASSWORD:-autonomyx}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AZURE_API_KEY=${AZURE_API_KEY}
      - AZURE_API_BASE=${AZURE_API_BASE}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - HF_TOKEN=${HF_TOKEN}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex_key.json
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://traces.openautonomyx.com}
      - LAGO_API_URL=${LAGO_API_URL:-https://billing.openautonomyx.com}
      - LAGO_API_KEY=${LAGO_API_KEY}
      - CLASSIFIER_URL=http://classifier:8100
      - RECOMMENDER_MODE=local
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./lago_callback.py:/app/lago_callback.py:ro
      - ./recommender.py:/app/recommender.py:ro
      - ./feedback.py:/app/feedback.py:ro
      - ./vertex_key.json:/app/vertex_key.json:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "8"]
    depends_on:
      litellm-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.litellm.rule=Host(`llm.openautonomyx.com`)"
      - "traefik.http.routers.litellm.entrypoints=https"
      - "traefik.http.routers.litellm.tls.certresolver=letsencrypt"
      - "traefik.http.services.litellm.loadbalancer.server.port=4000"

  litellm-db:
    image: postgres:15.7-alpine
    container_name: autonomyx-litellm-db
    restart: always
    networks:
      - coolify
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=litellm
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.3.14
    container_name: autonomyx-ollama
    restart: always
    networks:
      - coolify
    volumes:
      - ollama-data:/root/.ollama
      - ./ollama-pull.sh:/ollama-pull.sh:ro
    environment:
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-4}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
    mem_limit: ${OLLAMA_MEM_LIMIT:-76g}
    memswap_limit: ${OLLAMA_MEM_LIMIT:-76g}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: autonomyx-prometheus
    restart: always
    networks:
      - coolify
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: autonomyx-grafana
    restart: always
    networks:
      - coolify
    environment:
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - LANGFUSE_DB_PASSWORD=${LANGFUSE_DB_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-autonomyx}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`metrics.openautonomyx.com`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  langflow:
    image: langflowai/langflow:1.0.19
    container_name: autonomyx-langflow
    restart: always
    networks:
      - coolify
    environment:
      - DO_NOT_TRACK=true                     # disable telemetry (flow runs, env, components)
      - LANGFLOW_TELEMETRY_ENABLED=false       # belt + suspenders
      - LANGFLOW_AUTO_LOGIN=false              # disable auto-login for security
    depends_on:
      langflow-db:
        condition: service_healthy
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://langflow:${LANGFLOW_DB_PASSWORD}@langflow-db:5432/langflow
      - LANGFLOW_SECRET_KEY=${LANGFLOW_SECRET_KEY}
      - LANGFLOW_SUPERUSER=${LANGFLOW_ADMIN_EMAIL:-admin@openautonomyx.com}
      - LANGFLOW_SUPERUSER_PASSWORD=${LANGFLOW_ADMIN_PASSWORD}
      - LANGFLOW_AUTO_LOGIN=false
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=${LANGFLOW_VIRTUAL_KEY}
      - LANGFLOW_STORE=false
      - LANGFLOW_TELEMETRY_ENABLED=false
      - LANGFLOW_LOG_LEVEL=warning
    volumes:
      - langflow-data:/app/langflow
      - ./flows:/app/flows:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.langflow.rule=Host(`flows.openautonomyx.com`)"
      - "traefik.http.routers.langflow.entrypoints=https"
      - "traefik.http.routers.langflow.tls.certresolver=letsencrypt"
      - "traefik.http.services.langflow.loadbalancer.server.port=7860"

  langflow-db:
    image: postgres:15.7-alpine
    container_name: autonomyx-langflow-db
    restart: always
    networks:
      - coolify
    environment:
      - POSTGRES_USER=langflow
      - POSTGRES_PASSWORD=${LANGFLOW_DB_PASSWORD}
      - POSTGRES_DB=langflow
    volumes:
      - langflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  classifier:
    build:
      context: ./classifier
      dockerfile: Dockerfile
    container_name: autonomyx-classifier
    restart: always
    networks:
      - coolify

  translator:
    build:
      context: ./translator
      dockerfile: Dockerfile
    container_name: autonomyx-translator
    restart: always
    networks:
      - coolify

  playwright:
    build:
      context: ./playwright
      dockerfile: Dockerfile
    container_name: autonomyx-playwright
    restart: always
    networks:
      - coolify
    environment:
      - LITELLM_URL=http://litellm:4000
      - LITELLM_KEY=${LITELLM_MASTER_KEY}
      - OLLAMA_URL=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text
      - EXTRACT_MODEL=ollama/qwen3:30b-a3b
      - SURREAL_URL=${SURREAL_URL}
      - SURREAL_USER=${SURREAL_USER}
      - SURREAL_PASS=${SURREAL_PASS}
      - SURREAL_NS=${SURREAL_NS:-autonomyx}
      - SURREAL_DB=${SURREAL_DB:-scrapes}
      - MAX_PAGES=50
      - CHUNK_SIZE=512
    shm_size: '256m'
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
    labels:
      - "traefik.enable=false"





  # ── SurrealDB (self-hosted — agent memory, vector store, schema DB) ───────
  surrealdb:
    image: surrealdb/surrealdb:v2.3.6
    container_name: autonomyx-surrealdb
    restart: always
    networks:
      - coolify
    command:
      - start
      - --log=warn
      - --user=${SURREAL_USER}
      - --pass=${SURREAL_PASS}
      - rocksdb:/data/surreal.db
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--conn", "http://localhost:8000"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"   # internal only



  # ── frpc (Fast Reverse Proxy client — Apache 2.0, no cloud, no vendor lock-in)
  # Connects to frps server running as systemd service on same host
  # frps installed by bootstrap_server.sh, config at /etc/frp/frps.toml
  # frpc config mounted from ./frp/frpc.toml
  # Docs: https://github.com/fatedier/frp
  frpc:
    build:
      context: ./frpc
      dockerfile: Dockerfile
      args:
        FRP_VERSION: "0.62.0"
    image: ${ORG:-thefractionalpm}/autonomyx-frpc:0.62.0
    container_name: autonomyx-frpc
    restart: always
    networks:
      - coolify
    volumes:
      - ./frp/frpc.toml:/etc/frp/frpc.toml:ro
    labels:
      - "traefik.enable=false"

  # ── Dockge (Docker Compose stack manager UI) ─────────────────────────────
  dockge:
    image: louislam/dockge:1
    container_name: autonomyx-dockge
    restart: always
    networks:
      - coolify
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge-data:/app/data
      # Stacks dir: host path MUST equal container path
      - /home/ubuntu:/home/ubuntu:ro
    environment:
      - DOCKGE_STACKS_DIR=/home/ubuntu
    labels:
      - "traefik.enable=false"   # Cloudflare Tunnel handles routing


  # ── OpenTelemetry Stack (self-hosted telemetry — no data leaves VPS) ──────
  # CNCF projects, Apache 2.0 — Collector, Loki, Tempo
  # Replaces Grafana cloud telemetry (phones home) with local equivalents

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: autonomyx-otel-collector
    restart: always
    networks:
      - coolify
    command: ["--config", "/etc/otel/collector.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otel/collector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=false"

  loki:
    image: grafana/loki:3.4.2
    container_name: autonomyx-loki
    restart: always
    networks:
      - coolify
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    labels:
      - "traefik.enable=false"

  tempo:
    image: grafana/tempo:2.7.2
    container_name: autonomyx-tempo
    restart: always
    networks:
      - coolify
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    labels:
      - "traefik.enable=false"

  # ── Trust Centre (trust.openautonomyx.com) ───────────────────────────────
  trust:
    image: nginx:1.27-alpine
    container_name: autonomyx-trust
    restart: always
    networks:
      - coolify
    volumes:
      - ./trust:/usr/share/nginx/html:ro
      - ./trust/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trust.rule=Host(`trust.openautonomyx.com`)"
      - "traefik.http.routers.trust.entrypoints=https"
      - "traefik.http.routers.trust.tls.certresolver=letsencrypt"
      - "traefik.http.services.trust.loadbalancer.server.port=80"

  # ── OPA (conditional policy engine) ──────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.70.0-static
    container_name: autonomyx-opa
    restart: always
    networks:
      - coolify
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-format=json
      - --log-level=warn
      - /policies
    volumes:
      - ./opa:/policies:ro
    labels:
      - "traefik.enable=false"   # internal only



  # ── OPA (conditional policy engine) ──────────────────────────────────────────
  openfga-db:
    image: postgres:15.7-alpine
    container_name: autonomyx-openfga-db
    restart: always
    networks:
      - coolify
    environment:
      - POSTGRES_USER=openfga
      - POSTGRES_PASSWORD=${OPENFGA_DB_PASSWORD}
      - POSTGRES_DB=openfga
    volumes:
      - openfga-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  openfga:
    image: openfga/openfga:v1.8.0
    container_name: autonomyx-openfga
    restart: always
    networks:
      - coolify
    depends_on:
      openfga-db:
        condition: service_healthy
    command: run --datastore-engine=postgres --datastore-uri=postgres://openfga:${OPENFGA_DB_PASSWORD}@openfga-db:5432/openfga?sslmode=disable
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://openfga:${OPENFGA_DB_PASSWORD}@openfga-db:5432/openfga?sslmode=disable
      - OPENFGA_AUTHN_METHOD=preshared
      - OPENFGA_AUTHN_PRESHARED_KEYS=${OPENFGA_PRESHARED_KEY}
      - OPENFGA_LOG_FORMAT=json
      - OPENFGA_LOG_LEVEL=warn
      - OPENFGA_PLAYGROUND_ENABLED=false
    labels:
      - "traefik.enable=false"   # internal only — accessed by LiteLLM sidecar

  # ── GlitchTip (error tracking) ────────────────────────────────────────────
  glitchtip:
    image: glitchtip/glitchtip:6.1.5
    container_name: autonomyx-glitchtip
    restart: always
    networks:
      - coolify
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - PORT=8000
      - GLITCHTIP_DOMAIN=https://errors.openautonomyx.com
      - DEFAULT_FROM_EMAIL=errors@openautonomyx.com
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
      - ENABLE_USER_REGISTRATION=False
      - ENABLE_ORGANIZATION_CREATION=False
    volumes:
      - glitchtip-uploads:/code/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glitchtip.rule=Host(`errors.openautonomyx.com`)"
      - "traefik.http.routers.glitchtip.entrypoints=https"
      - "traefik.http.routers.glitchtip.tls.certresolver=letsencrypt"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  glitchtip-worker:
    image: glitchtip/glitchtip:6.1.5
    container_name: autonomyx-glitchtip-worker
    restart: always
    networks:
      - coolify
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip-db:5432/glitchtip
      - REDIS_URL=redis://glitchtip-redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    labels:
      - "traefik.enable=false"

  glitchtip-db:
    image: postgres:15.7-alpine
    container_name: autonomyx-glitchtip-db
    restart: always
    networks:
      - coolify
    environment:
      - POSTGRES_USER=glitchtip
      - POSTGRES_PASSWORD=${GLITCHTIP_DB_PASSWORD}
      - POSTGRES_DB=glitchtip
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"

  glitchtip-redis:
    image: redis:7.2-alpine
    container_name: autonomyx-glitchtip-redis
    restart: always
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=false"
