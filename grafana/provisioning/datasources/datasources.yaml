# grafana/provisioning/datasources/datasources.yaml
# Auto-provisioned on Grafana startup — no manual configuration needed
# All backends are internal — no cloud endpoints

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"(\w+)"'
          matcherType: label
          url: '$${__value.raw}'
          datasourceUid: jaeger

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: true
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid: loki
        mapTagNamesEnabled: true
        mappedTags:
          - key: service.name
            value: service_name
        filterByTraceID: true
      nodeGraph:
        enabled: true

  - name: Langfuse (LLM Traces)
    type: postgres
    uid: langfuse
    access: proxy
    url: langfuse-db:5432
    user: langfuse
    secureJsonData:
      password: '${LANGFUSE_DB_PASSWORD}'
    database: langfuse
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1500
