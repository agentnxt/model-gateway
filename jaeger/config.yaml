service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [jaeger_storage_exporter]

extensions:
  jaeger_storage:
    backends:
      main_store:
        badger:
          directories:
            keys:   /badger/key
            values: /badger/data
          ephemeral: false

  jaeger_query:
    storage:
      traces: main_store

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  jaeger_storage_exporter:
    trace_storage: main_store
