# jaeger/config.yaml
# Jaeger v2 — CNCF Graduated, Apache 2.0
# All-in-one: collector + storage + UI in single binary/container
# Built on OpenTelemetry Collector — accepts OTLP natively
# Storage: badger (embedded key-value, no external DB needed)
# UI: http://jaeger:16686

service:
  extensions: [jaeger_storage, jaeger_query]
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [jaeger_storage_exporter]

extensions:
  jaeger_storage:
    backends:
      main_store:
        badger:
          directory_key:   /badger/key
          directory_value: /badger/data
          ephemeral:       false    # persist to disk

  jaeger_query:
    storage:
      traces: main_store
    ui:
      config_file: /etc/jaeger/jaeger-ui.json

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  jaeger_storage_exporter:
    trace_storage: main_store
