# loki/config.yaml
# Grafana Loki — log aggregation, Apache 2.0 (Loki itself)
# Stores all container and application logs on VPS filesystem

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store:      tsdb
      object_store: filesystem
      schema:     v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Retention — 30 days matches Langfuse trace retention
  retention_period: 720h
  # Reject logs larger than 512KB per line
  max_line_size: 524288
  # No sending to Grafana Cloud
  allow_structured_metadata: false

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
