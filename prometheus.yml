global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: litellm
    static_configs:
      - targets: ["litellm:4000"]
    metrics_path: /metrics

  - job_name: ollama
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: /metrics

  - job_name: classifier
    static_configs:
      - targets: ["classifier:8100"]
    metrics_path: /metrics

  - job_name: translator
    static_configs:
      - targets: ["translator:8200"]
    metrics_path: /metrics

  - job_name: playwright
    static_configs:
      - targets: ["playwright:8400"]
    metrics_path: /metrics
