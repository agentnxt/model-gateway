# tempo/config.yaml
# Grafana Tempo — distributed trace storage, Apache 2.0
# Stores traces from LiteLLM, Langflow, and any OTEL-instrumented service

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h   # 30 days

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

# No remote_write — all data stays local
# No Grafana Cloud integration
